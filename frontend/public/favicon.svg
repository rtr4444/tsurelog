<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <style>
      .bg {
        fill: #eceff3;
      }
      .brand-char {
        font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
        font-weight: bold;
        fill: #1A365D;
      }
      .rod {
        stroke: #F97316;
        stroke-width: 12;
        stroke-linecap: round;
        fill: none;
      }
      .line {
        stroke: #FFFFFF;
        stroke-width: 5;
        stroke-linecap: round;
        fill: none;
      }
      .fish {
        fill: #F97316;
      }
    </style>
  </defs>

  <!-- 円形背景 -->
  <circle cx="256" cy="256" r="240" class="bg" />

  <!-- 「釣」文字 -->
  <text x="142" y="345" font-size="220" class="brand-char">釣</text>

  <!-- 釣り竿・糸・魚のモチーフ -->
  <path class="rod" d="M 230 230 C 260 120, 350 90, 430 110" />
  <path class="line" d="M 430 110 L 430 175" />
  
  <g transform="translate(415, 175) rotate(35)">
    <path class="fish" d="M 0 0 C 10 -7, 20 -3, 26 7 C 20 17, 10 21, 0 14 Z" />
    <path class="fish" d="M 26 7 L 33 2 L 30 7 L 34 12 Z" />
  </g>
</svg>
